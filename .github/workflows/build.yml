name: Build OPCDA Node Addon (Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js (v20)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'

    - name: Setup Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install OPC Core Components
      run: |
        Expand-Archive -Path "OpcComponents/x64/OPC Core Components Redistributable (x64) 105.1.zip" -DestinationPath "OpcComponents/extracted" -Force
        $msiPath = "OpcComponents/extracted/OPC Core Components Redistributable (x64).msi"
        if (Test-Path $msiPath) {
          Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /quiet /qn /norestart /log install.log" -Wait -NoNewWindow
        }
      shell: pwsh
      continue-on-error: true

    - name: Install dependencies
      run: npm ci

    - name: Build addon (.node)
      run: npm run build
      shell: pwsh    

    - name: Upload .node artifact
      uses: actions/upload-artifact@v4
      with:
        name: opcda-windows-node
        path: |
          build/Release/opcda.node
          index.js
          package.json
        retention-days: 30

    - name: Create release asset
      if: github.event_name == 'release'
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ github.event.release.upload_url }}
        asset_path: build/Release/opcda.node
        asset_name: opcda-win-x64.node
        asset_content_type: application/octet-stream

    - name: Publish to npm
      if: github.event_name == 'push'
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        $LATEST = npm view @amigo909090/opcda-node version 2>$null
        if (-not $LATEST) { $LATEST = "0.0.0" }
        $NEW_VERSION = npx semver -i patch $LATEST
        echo "New version: $NEW_VERSION"
        npm version $NEW_VERSION --no-git-tag-version
        git add package.json package-lock.json
        git commit -m "Bump version to $NEW_VERSION"
        git push origin main
        jq 'del(.scripts) | del(.devDependencies)' package.json > package_npm.json
        Move-Item -Force package_npm.json package.json
        npm publish --access public
        git tag "v$NEW_VERSION"
        git push origin "v$NEW_VERSION"
        git checkout -- package.json
      shell: pwsh
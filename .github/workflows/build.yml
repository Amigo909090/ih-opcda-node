name: Build OPCDA Node Addon (Windows)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  release:
    types: [ published ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js (v20)
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        registry-url: 'https://registry.npmjs.org'

    - name: Setup Python 3.11 (for node-gyp)
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install OPC Core Components from repo zip
      run: |
        Expand-Archive -Path "OpcComponents/x64/OPC Core Components Redistributable (x64) 105.1.zip" -DestinationPath "OpcComponents/extracted" -Force
        $msiPath = "OpcComponents/extracted/OPC Core Components Redistributable (x64).msi"
        if (Test-Path $msiPath) {
          Start-Process msiexec.exe -ArgumentList "/i `"$msiPath`" /quiet /qn /norestart /log install.log" -Wait -NoNewWindow
          Write-Output "OPC Core installed via MSI"
        } else {
          Write-Warning "MSI not found; trying setup.exe"
          $setupPath = "OpcComponents/extracted/setup.exe"
          if (Test-Path $setupPath) {
            Start-Process $setupPath -ArgumentList "/S /v/qn REBOOT=ReallySuppress" -Wait -NoNewWindow
          }
        }
      shell: pwsh
      continue-on-error: true

    - name: Install dependencies
      run: npm ci

    - name: Build addon (.node)
      run: npm run build
      shell: pwsh

    - name: Test build (optional)
      run: node index.js
      continue-on-error: true

    - name: Upload .node artifact
      uses: actions/upload-artifact@v4
      with:
        name: opcda-windows-node
        path: |
          build/Release/opcda.node
          index.js
          package.json
        retention-days: 30

    - name: Get version from package.json
      id: get_version
      run: echo "VERSION=$(node -p "require('./package.json').version")" >> $env:GITHUB_OUTPUT
      shell: pwsh

    - name: Create GitHub Release (if push to main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: ncipollo/release-action@v1
      with:
        tag: v${{ steps.get_version.outputs.VERSION }}
        name: Release v${{ steps.get_version.outputs.VERSION }}
        generateReleaseNotes: true
        skipIfReleaseExists: true
        token: ${{ secrets.RELEASE_TOKEN }}
        artifacts: build/Release/opcda.node
        artifactContentType: application/octet-stream

    - name: Publish to npm
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      env:
        NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      run: |
        git config --global user.email "petrovandrey90@yandex.ru"
        git config --global user.name "Amigo909090"

        # Получаем последнюю версию из npm
        $LATEST = npm view @amigo9090/opcda-node version 2>$null
        if (-not $LATEST) { $LATEST = "0.0.0" }
        $NEW_VERSION = npx semver -i patch $LATEST
        echo "New version: $NEW_VERSION"

        # Обновляем версию в package.json (без git-тега)
        npm version $NEW_VERSION --no-git-tag-version
        git add package.json package-lock.json
        git commit -m "Bump version to $NEW_VERSION"
        git push origin main

        # Проверяем, существует ли уже тег
        $TAG = "v$NEW_VERSION"
        $TAG_EXISTS = git ls-remote --tags origin | Select-String $TAG
        if ($TAG_EXISTS) {
          Write-Host "Tag $TAG already exists, skipping creation"
        } else {
          # Удаляем локальный тег, если есть (на случай, если он остался)
          git tag -d $TAG 2>$null
          git tag $TAG
          git push origin $TAG
        }

        # Подготавливаем package.json для публикации (удаляем scripts и devDependencies)
        $package = Get-Content package.json -Raw | ConvertFrom-Json
        $package.PSObject.Properties.Remove('scripts')
        $package.PSObject.Properties.Remove('devDependencies')
        $package | ConvertTo-Json -Depth 10 | Set-Content package_npm.json
        Move-Item -Force package_npm.json package.json

        # Публикуем в npm
        npm publish --access public
        echo "Published @amigo9090/opcda-node@$NEW_VERSION"

        # Восстанавливаем package.json
        git checkout -- package.json
      shell: pwsh